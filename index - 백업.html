<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>월드컵 영상취재 가이드라인</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:"Pretendard","Noto Sans KR",Arial,sans-serif;background:linear-gradient(135deg,#f7f8fb 0%,#eef1f7 100%);color:#111}
.page{padding:28px}
.header{margin-bottom:20px;padding:24px 28px;border-radius:20px;background:linear-gradient(135deg,#10131a 0%,#1a2233 55%,#d71920 140%);color:#fff}
.header h1{margin:0;font-size:34px;font-weight:800}
.container{display:flex;gap:14px;align-items:flex-start}
.sidebar,.column,.table-column{background:rgba(255,255,255,.92);border-radius:18px;padding:18px}
.sidebar{width:220px;position:relative}
.sidebar:before{content:"";position:absolute;left:0;top:0;width:4px;height:100%;border-radius:18px 0 0 18px;background:linear-gradient(180deg,#d71920 0%,#8f1015 100%)}
.column{width:240px;max-height:70vh;overflow-y:auto}
.table-column{flex:1;min-height:560px}
.menu,.item{cursor:pointer;padding:12px 14px;margin-bottom:8px;border-radius:10px;user-select:none;white-space:normal;word-break:keep-all;line-height:1.35}
.menu{min-height:48px;display:flex;align-items:center;background:#222;color:#fff;font-weight:700}
.item{background:#f5f7fb;color:#1c2230}
.active{background:#d71920;color:#fff}
.hidden{display:none}
.section-title{margin:0 0 14px;font-size:24px;font-weight:800}
.section-subtitle{margin:0 0 16px;color:#64748b;font-size:14px}
.table-card{border:1px solid #e5e7eb;border-radius:16px;overflow:hidden;background:#fff}
.data-table{width:100%;border-collapse:collapse}
.data-table th,.data-table td{padding:12px 14px;border-bottom:1px solid #e5e7eb;border-right:1px solid #e5e7eb;vertical-align:middle}
.data-table td:nth-child(4){white-space:nowrap}
.data-table th:last-child,.data-table td:last-child{border-right:none}
.data-table th{text-align:left;background:#f8fafc;font-weight:700}
.group-rank-cell,.group-coach-cell{text-align:center}
.flag-cell{display:flex;align-items:center;gap:8px}
.flag-icon{width:24px;height:16px;object-fit:cover;border:1px solid rgba(0,0,0,.08);border-radius:2px;background:#fff}
.group-match-wrap{margin-top:18px}
.group-match-title{margin:0 0 12px;font-size:18px;font-weight:800}
.group-match-number{display:inline-flex;align-items:center;justify-content:center;min-width:44px;padding:6px 10px;border-radius:999px;background:#d71920;color:#fff;font-size:12px;font-weight:800}
.vs-cell{display:flex;align-items:center;justify-content:center;gap:10px;font-weight:700;white-space:nowrap}
.team-side{display:inline-flex;align-items:center;gap:8px}
.match-cell{position:relative;min-width:260px;text-align:center}
.match-badge{position:absolute;top:8px;left:10px;background:#d71920;color:#fff;font-weight:800;font-size:11px;padding:4px 8px;border-radius:6px}
.match-text{text-align:center;padding-top:18px;font-weight:700;line-height:1.5}
.match-meta{text-align:center;color:#475569;font-size:13px;line-height:1.7}
.stadium-placeholder,.photo-placeholder{display:flex;align-items:center;justify-content:center;color:#94a3b8;font-size:12px;font-weight:700;background:#eef1f7;border:1px dashed #cbd5e1;border-radius:10px}
.stadium-placeholder{width:100%;height:70px}
.photo-placeholder{width:42px;height:42px}
.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.toolbar-btn{border:1px solid #e5e7eb;background:#fff;color:#1c2230;padding:8px 12px;border-radius:999px;font-weight:700;cursor:pointer}
.toolbar-btn.active{background:#d71920;border-color:#d71920;color:#fff}
.pagination{display:flex;justify-content:flex-end;align-items:center;gap:8px;margin-top:12px}
.page-btn{border:1px solid #e5e7eb;background:#fff;padding:6px 10px;border-radius:8px;cursor:pointer;font-weight:700}
.page-btn:disabled{opacity:.4;cursor:default}
.table-column select{width:100%;max-width:96px;padding:6px 8px;border-radius:8px;border:1px solid #cbd5e1;background:#f8fafc;font-weight:600;color:#1e293b;cursor:pointer;transition:all .2s ease}
.table-column select:hover{border-color:#94a3b8;background:#f1f5f9}
.table-column select:focus{outline:none;border-color:#d71920;box-shadow:0 0 0 2px rgba(215,25,32,.15);background:#fff}
.data-table td:nth-child(4),.data-table th:nth-child(4){width:72px;text-align:center}
@media (max-width:1200px){.container{flex-direction:column}.sidebar,.column,.table-column{width:100%;max-height:none}}
</style>
</head>

function getFlag(code){return code ? `https://flagcdn.com/w40/${code}.png` : null;}
function kstToLocal(date,timeStr){
  if(!date||!timeStr||timeStr==='-') return {date:'-',time:'-'};
  const t=timeStr.replace(' KST','');
  const [hh,mm]=t.split(':').map(Number);
  const d=new Date(`${date}T${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')}:00+09:00`);
  d.setHours(d.getHours()-13);
  return {
    date:`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`,
    time:`${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`
  };
}

}

function renderSquad(key){
  clearDetailExtras();
  const state=squadState[key];
  const squad=squads[key];
  const filtered=state.filter==='ALL'?squad:squad.filter(p=>p.position===state.filter);

  state.page=Math.min(totalPages,Math.max(1,state.page));
  const rows=filtered.slice((state.page-1)*PAGE_SIZE,state.page*PAGE_SIZE);
  document.getElementById('detailTitle').textContent=state.title;
  document.getElementById('detailSubtitle').textContent='포지션 탭 + 페이지 분할 적용';

  document.getElementById('detailTable').insertAdjacentHTML('beforebegin',`<div class="toolbar">${['ALL','GK','DF','MF','FW'].map(pos=>`<button class="toolbar-btn ${state.filter===pos?'active':''}" onclick="setSquadFilter('${key}','${pos}')">${pos==='ALL'?'전체':pos}</button>`).join('')}</div>`);

function showEquipmentPersonal(user, el){
  document.querySelectorAll('#equipmentUserCol .item').forEach(b=>b.classList.remove('active'));
  if(el) el.classList.add('active');
  clearDetailExtras();
  document.getElementById('detailTitle').textContent=`${user} 개인장비`;
  document.getElementById('detailSubtitle').textContent='개인 장비 목록';
  const rows=Array.from({length:10}).map(()=>`<tr><td></td><td></td><td></td><td><select>${Array.from({length:10}).map((_,i)=>`<option>${i+1}</option>`).join('')}</select></td><td></td></tr>`).join('');
  document.getElementById('detailTable').innerHTML=`<thead><tr><th>장비 모델명</th><th>제조사</th><th>시리얼</th><th>수량</th><th>비고</th></tr></thead><tbody>${rows}</tbody>`;
  document.getElementById('detailCol').classList.remove('hidden');
}
